    body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; color: #111827; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    /* Scrollbar minimalis untuk dasbor */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #E5E7EB; border-radius: 10px; }
    .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #D1D5DB; }

</head>
<body>

      Calendar: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      User: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      LogOut: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,

      Plus: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Edit: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      Trash2: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      X: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Image: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>,
      LayoutDashboard: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
      LineChart: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>,

      Bell: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
      Menu: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
      Activity: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
      Type: (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>
    };

    const defaultHero = {
      id: 'hero_1',
      badge: 'Sistem Informasi Terpadu',
      title1: 'Pusat Layanan Data Keuangan',
      title2: 'UIN Palopo',
      description: 'Akses cepat ke berbagai sistem aplikasi keuangan, pembaruan regulasi terbaru, dan informasi anggaran secara transparan dan terintegrasi dalam satu platform cerdas.',
      btn1_text: 'Mulai Eksplorasi',
      btn1_target: 'aplikasi',
      btn2_text: 'Lihat Regulasi Terbaru',
      btn2_target: 'peraturan',
      bg_image_url: ''
    };

    const defaultSections = [
      { id: 'sec_1', section_key: 'aplikasi', title: 'Portal Aplikasi', subtitle: 'Sistem terintegrasi kementerian keuangan' },
      { id: 'sec_2', section_key: 'berita', title: 'Berita & Pembaruan', subtitle: 'Informasi terbaru seputar anggaran & keuangan' },
      { id: 'sec_3', section_key: 'peraturan', title: 'Regulasi Terkini', subtitle: 'Arsip dokumen & landasan hukum' }
    ];

    // 2. DATA FETCHING LAYER (Dengan Optimasi Cache / SWR)
    function usePortalData() {
      const [data, setData] = useState({ berita: [], links: [], peraturan: [], hero: [defaultHero], sections: defaultSections });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        const loadData = async () => {
          if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL === "MASUKKAN_URL_GAS_ANDA_DI_SINI") {
            setError("Tolong atur URL Web App Google Apps Script di dalam kode index.html.");
            setLoading(false);
            return;
          }

          const cachedData = localStorage.getItem('portalUINData');
          let parsedCache = null;

          if (cachedData) {
            try {
              parsedCache = JSON.parse(cachedData);
              setData(parsedCache);
              setLoading(false);
            } catch (e) {
              console.error("Cache tidak valid");
            }
          } else {
             setLoading(true);
          }

          try {
            const response = await fetch(`${GAS_WEB_APP_URL}?action=getData`);
            if (!response.ok) throw new Error(`Kesalahan HTTP! status: ${response.status}`);
            
            const result = await response.json();
            
            if (result.success || result.status === 'success') {
              const finalData = result.data || result;
              
              // Gunakan data fallback dari cache jika backend tidak mengirimkan hero
              const heroData = (finalData.hero && finalData.hero.length > 0) 
                               ? finalData.hero 
                               : (parsedCache && parsedCache.hero && parsedCache.hero.length > 0 ? parsedCache.hero : [defaultHero]);
                               
              // Gunakan data fallback dari cache jika backend tidak mengirimkan sections
              const sectionsData = (finalData.sections && finalData.sections.length > 0) 
                               ? finalData.sections 
                               : (parsedCache && parsedCache.sections && parsedCache.sections.length > 0 ? parsedCache.sections : defaultSections);
              
              const formattedData = {
                berita: finalData.berita || [],
                links: finalData.links || [],
                peraturan: finalData.peraturan || [],
                hero: heroData,
                sections: sectionsData
              };
              
              setData(formattedData);
              localStorage.setItem('portalUINData', JSON.stringify(formattedData));
            } else {
              if (!cachedData) throw new Error(result.message || "Gagal mengambil data dari server.");
            }
          } catch (err) {
            if (!cachedData) setError(err.message || "Koneksi ke server terputus.");
          } finally {
            setLoading(false);
          }
        };

        loadData();
      }, []);

      return { data, loading, error, setData };
    }

    // 3. UI COMPONENTS (Gaya SaaS)
    const Card = ({ children, className = "", noPadding = false, ...props }) => (
      <div className={`bg-white rounded-[16px] border border-gray-200 shadow-sm transition-shadow hover:shadow-md overflow-hidden ${className}`} {...props}>
        {noPadding ? children : <div className="p-6">{children}</div>}
      </div>
    );

    const Badge = ({ children, variant = "default", className = "" }) => {
      const variants = {
        default: "bg-indigo-50 text-primary border border-indigo-100",
        outline: "bg-white border border-gray-200 text-gray-600",
        primary: "bg-primary text-white",
        success: "bg-emerald-50 text-success border border-emerald-100"
      };
      return <span className={`px-3 py-1 rounded-full text-[14px] font-medium ${variants[variant]} ${className}`}>{children}</span>;
    };

    const Button = ({ children, variant = "primary", className = "", ...props }) => {
      const baseStyle = "inline-flex items-center justify-center rounded-[12px] text-[16px] font-semibold transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:pointer-events-none";
      const variants = {
        primary: "bg-primary text-white hover:bg-secondary shadow-sm px-6 py-3 focus:ring-primary",
        outline: "border border-gray-200 bg-white text-gray-700 hover:bg-gray-50 px-6 py-3 focus:ring-gray-200",
        ghost: "text-gray-600 hover:bg-gray-100 hover:text-gray-900 px-4 py-2",
        danger: "bg-error text-white hover:bg-red-600 shadow-sm px-6 py-3 focus:ring-error",
        ghost_danger: "text-error hover:bg-red-50 p-2 rounded-[10px]",
        ghost_primary: "text-primary hover:bg-indigo-50 p-2 rounded-[10px]"
      };
      return <button className={`${baseStyle} ${variants[variant]} ${className}`} {...props}>{children}</button>;
    };

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm animate-in fade-in duration-200">
          <div className="bg-white rounded-[16px] shadow-xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-200">
            <div className="flex items-center justify-between p-6 border-b border-gray-200">
              <h3 className="font-semibold text-[18px] font-display text-gray-900">{title}</h3>
              <button type="button" onClick={onClose} className="text-gray-400 hover:text-gray-700 transition-colors"><Icons.X className="w-5 h-5" /></button>
            </div>
            <div className="p-6 max-h-[75vh] overflow-y-auto custom-scrollbar">{children}</div>
          </div>
        </div>
      );
    };

    // 4. APLIKASI UTAMA
    function App() {
      const { data, loading, error, setData } = usePortalData();
      const [activeTab, setActiveTab] = useState('home');
      const [currentUser, setCurrentUser] = useState(null); 
      const [loginUsername, setLoginUsername] = useState('');
      const [loginPassword, setLoginPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      
      const [adminSubTab, setAdminSubTab] = useState('dashboard');
      const [modalConfig, setModalConfig] = useState({ isOpen: false, type: '', mode: 'add', item: null });
      const [formData, setFormData] = useState({});
      const [heroForm, setHeroForm] = useState(defaultHero);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [selectedNews, setSelectedNews] = useState(null);

      useEffect(() => {
        if (data.hero && data.hero[0]) {
          setHeroForm(data.hero[0]);
        }
      }, [data.hero]);

      const renderIcon = (iconName, props) => {
        const IconComponent = Icons[iconName] || Icons.ExternalLink;
        return <IconComponent {...props} />;
      };

      // FUNGSI MENGAMBIL JUDUL BAGIAN (Robust, kebal typo spasi)
      const getSection = (key) => {
        const sec = data.sections?.find(s => String(s.section_key).trim().toLowerCase() === key.toLowerCase());
        const def = defaultSections.find(s => s.section_key === key);
        return {
          title: sec?.title || def?.title || '',
          subtitle: sec?.subtitle || def?.subtitle || ''
        };
      };

      // --- LOGIN VIA FETCH ---
      const handleLogin = async (e) => {
        e.preventDefault();
        setLoginError('');
        setIsSubmitting(true);
        try {
          const res = await fetch(`${GAS_WEB_APP_URL}?action=login&username=${encodeURIComponent(loginUsername)}&password=${encodeURIComponent(loginPassword)}`);
          const result = await res.json();
          if (result.success) {
            setCurrentUser({ name: result.name, role: result.role });
            setActiveTab(result.role === 'admin' ? 'admin' : 'home');
            setAdminSubTab('dashboard');
            setLoginUsername('');
            setLoginPassword('');
          } else {
            setLoginError(result.message || 'Nama pengguna atau kata sandi salah.');
          }
        } catch (err) {
          setLoginError('Gagal menghubungi server: ' + err.message);
        } finally {
          setIsSubmitting(false);
        }
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setActiveTab('home');
      };

      const openModal = (type, mode, item = null) => {
        setFormData(item || {});
        setModalConfig({ isOpen: true, type, mode, item });
      };

      const closeModal = () => {
        setModalConfig({ isOpen: false, type: '', mode: 'add', item: null });
        setFormData({});
      };

      const handleFormChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleHeroFormChange = (e) => {
        const { name, value } = e.target;
        setHeroForm(prev => ({ ...prev, [name]: value }));
      };

      const handleHeroBtnClick = (target) => {
        if (!target) return;
        if (target.startsWith('http')) {
          window.open(target, '_blank', 'noopener,noreferrer');
        } else {
          setActiveTab(target);
        }
      };

      // --- CRUD FETCH ---
      const handleSave = async (e) => {
        e.preventDefault();
        const { type, mode, item } = modalConfig;
        setIsSubmitting(true);
        const newItem = { ...formData, id: mode === 'add' ? `new_${Date.now()}` : item.id, status: 'aktif' };

        try {
          const res = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'save', type, mode, item: newItem }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          const result = await res.json();
          if (result.success) {
            setData(prevData => {
              const updatedList = mode === 'add' ? [...prevData[type], newItem] : prevData[type].map(d => d.id === item.id ? newItem : d);
              const newDataComplete = { ...prevData, [type]: updatedList };
              localStorage.setItem('portalUINData', JSON.stringify(newDataComplete));
              return newDataComplete;
            });
            closeModal();
          } else {
            alert("Gagal menyimpan data: " + result.message);
          }
        } catch (err) {
          alert("Gagal menghubungi server: " + err.message);
        } finally {
          setIsSubmitting(false);
        }
      };

      const handleSaveHero = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        const newItem = { ...heroForm, id: 'hero_1', status: 'aktif' };

        try {
          const res = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'save', type: 'hero', mode: 'edit', item: newItem }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          const result = await res.json();
          if (result.success) {
            setData(prevData => {
              const newDataComplete = { ...prevData, hero: [newItem] };
              localStorage.setItem('portalUINData', JSON.stringify(newDataComplete));
              return newDataComplete;
            });
            alert("Pengaturan Spanduk Hero berhasil diperbarui!");
          } else {
            alert("Gagal menyimpan data: " + result.message);
          }
        } catch (err) {
          alert("Gagal menghubungi server: " + err.message);
        } finally {
          setIsSubmitting(false);
        }
      };

      const handleDelete = async (type, id) => {
        if(window.confirm('Apakah Anda yakin ingin menghapus data ini secara permanen?')) {
          setIsSubmitting(true);
          try {
             const res = await fetch(`${GAS_WEB_APP_URL}?action=delete&type=${encodeURIComponent(type)}&id=${encodeURIComponent(id)}`);
             const result = await res.json();
             if (result.success) {
               setData(prevData => {
                 const newDataComplete = { ...prevData, [type]: prevData[type].filter(item => item.id !== id) };
                 localStorage.setItem('portalUINData', JSON.stringify(newDataComplete));
                 return newDataComplete;
               });
             } else {
               alert("Gagal menghapus data: " + result.message);
             }
          } catch (err) {
             alert("Gagal menghubungi server: " + err.message);
          } finally {
            setIsSubmitting(false);

                    <Icons.ExternalLink className="w-6 h-6" />
                  </div>
                </div>
                <h3 className="text-[32px] font-bold font-display text-gray-900 leading-tight">{totalAplikasi}</h3>

              </Card>
              
              <Card noPadding={true} className="p-6 relative overflow-hidden group">
                <div className="flex justify-between items-start mb-4">
                  <div className="w-12 h-12 rounded-[12px] bg-purple-50 border border-purple-100 flex items-center justify-center text-purple-600 group-hover:scale-110 transition-transform">
                    <Icons.FileText className="w-6 h-6" />
                  </div>
                </div>
                <h3 className="text-[32px] font-bold font-display text-gray-900 leading-tight">{totalRegulasi}</h3>
                <p className="text-[14px] text-gray-500 font-medium">Total Regulasi</p>

              <Card noPadding={true} className="p-6 relative overflow-hidden group bg-primary">

                <div className="flex justify-between items-start mb-4 relative z-10">

                    <span className="mt-3 text-[13px] font-medium text-gray-500">Aplikasi</span>

                    <span className="mb-2 text-[14px] font-bold text-purple-600">{totalRegulasi}</span>
                    <div className="w-full bg-purple-100 rounded-t-[8px] transition-all group-hover:bg-purple-600" style={{height: `${barRegulasi || 5}%`}}></div>
                    <span className="mt-3 text-[13px] font-medium text-gray-500">Regulasi</span>
                  </div>

                </div>
              </Card>

              <Card className="min-h-[380px] flex flex-col relative overflow-hidden">

                <div className="flex-1 flex items-center justify-center">

              <Card className="bg-gradient-to-br from-gray-900 to-gray-800 text-white flex flex-col justify-center items-center text-center border-none">

                 <p className="text-[14px] text-gray-400 mb-6">Seluruh antarmuka ini terhubung langsung secara real-time dengan Google Sheets Anda.</p>
                 <Button variant="primary" className="w-full bg-indigo-500 hover:bg-indigo-400 text-white shadow-lg border-none" onClick={() => setAdminSubTab('sections')}>
                   Kelola Judul Bagian
                 </Button>
              </Card>
            </div>
          </div>
        );
      };

      // 2. TABEL DATA ADMIN (Terdapat pengaturan allowAddDelete)
      const renderAdminTable = (type, title, columns, dataList, allowAddDelete = true) => (
        <div className="animate-in fade-in duration-300">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
            <div>
              <h3 className="text-[24px] font-semibold font-display text-gray-900 leading-tight">{title}</h3>
              <p className="text-[14px] text-gray-500 mt-1">Kelola konfigurasi dan data {title.toLowerCase()} platform.</p>
            </div>
            {allowAddDelete && (
              <Button onClick={() => openModal(type, 'add')} className="flex-shrink-0" disabled={isSubmitting}>
                <Icons.Plus className="w-5 h-5 mr-2" /> Tambah Data Baru
              </Button>
            )}
          </div>
          
          <Card noPadding={true}>
            <div className="overflow-x-auto">
              <table className="w-full text-left text-[14px]">
                <thead className="bg-gray-50 border-b border-gray-200">
                  <tr>
                    {columns.map((col, idx) => <th key={idx} className="px-6 py-4 font-semibold text-gray-500 whitespace-nowrap">{col.label}</th>)}
                    <th className="px-6 py-4 font-semibold text-gray-500 text-right">Aksi</th>
                  </tr>
                </thead>
                <tbody className={`divide-y divide-gray-200 ${isSubmitting ? 'opacity-50 pointer-events-none' : ''}`}>
                  {(!dataList || dataList.length === 0) ? (
                    <tr><td colSpan={columns.length + 1} className="px-6 py-12 text-center text-gray-500">Tidak ada data ditemukan.</td></tr>
                  ) : (
                    dataList.map((item) => (
                      <tr key={item.id} className="bg-white hover:bg-gray-50 transition-colors">
                        {columns.map((col, idx) => (
                          <td key={idx} className="px-6 py-4 font-medium text-gray-900 max-w-[200px] truncate">
                            {col.format ? col.format(item[col.key]) : item[col.key]}
                          </td>

                        <td className="px-6 py-4 text-right whitespace-nowrap">
                          <Button variant="ghost_primary" onClick={() => openModal(type, 'edit', item)} title="Edit">

                          {allowAddDelete && (
                            <Button variant="ghost_danger" onClick={() => handleDelete(type, item.id)} title="Hapus" className="ml-2">

      // --- LOGIKA RENDER ---
      if (loading) return null;

      if (error) return (
        <div className="min-h-screen bg-[#F9FAFB] flex items-center justify-center p-4 font-sans">
          <Card className="max-w-md w-full text-center">
            <Icons.AlertCircle className="w-12 h-12 text-error mx-auto mb-4" />
            <h2 className="text-[24px] font-bold font-display text-gray-900 mb-2">Koneksi Gagal</h2>
            <p className="text-[16px] text-gray-500 mb-6">{error}</p>
            <Button onClick={() => window.location.reload()} className="w-full">Coba Lagi</Button>
          </Card>
        </div>
      );

      // TATA LETAK 1: DASBOR ADMIN CRM
      if (currentUser?.role === 'admin' && activeTab === 'admin') {
        return (
          <div className="flex h-screen bg-[#F9FAFB] font-sans overflow-hidden">
            {/* Sidebar Kiri */}
            <aside className="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex shrink-0 z-10">
              <div className="h-20 flex items-center px-6 border-b border-gray-200 cursor-pointer" onClick={() => setActiveTab('home')}>
                <div className="w-8 h-8 rounded-[8px] bg-gradient-to-br from-secondary to-accent flex items-center justify-center text-white mr-3 shadow-sm">
                  <Icons.Building2 className="w-4 h-4 text-white" />

              </div>

                    className={`w-full flex items-center px-3 py-2.5 rounded-[10px] text-[14px] font-semibold transition-all ${adminSubTab === tab ? 'bg-primary text-white shadow-sm' : 'text-gray-500 hover:bg-gray-50 hover:text-gray-900'}`}

                    {tab === 'aplikasi' && <Icons.ExternalLink className="w-5 h-5 mr-3 opacity-90" />}

                <div className="flex items-center p-2 rounded-[10px] hover:bg-gray-50 transition-colors mb-2">
                  <div className="w-9 h-9 rounded-full bg-indigo-50 text-primary flex items-center justify-center font-bold font-display border border-indigo-100">

                    <p className="text-[14px] font-semibold text-gray-900 truncate leading-tight">{currentUser.name}</p>

            {/* Ruang Kerja Utama */}
            <main className="flex-1 flex flex-col h-screen overflow-hidden">
              <header className="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-8 shrink-0 z-0">

                <div className="text-gray-600 whitespace-pre-wrap text-[16px] leading-relaxed border-t border-gray-100 pt-6">{selectedNews.konten || selectedNews.ringkasan}</div>
                <div className="pt-4 flex justify-end"><Button onClick={() => setSelectedNews(null)} variant="outline">Tutup Artikel</Button></div>
              </div>
            )}
